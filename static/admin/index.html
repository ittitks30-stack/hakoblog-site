<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>テンショク・ラボ 管理画面</title>
  </head>
  <body>
    <div id="nc-error" style="display:none;padding:20px;background:#f8d7da;color:#721c24;font-family:sans-serif;font-size:14px;white-space:pre-wrap;"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('nc-error');
        el.style.display = 'block';
        el.textContent = 'JS Error: ' + msg + '\nSource: ' + src + '\nLine: ' + line;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('nc-error');
        el.style.display = 'block';
        el.textContent += '\nPromise Error: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
      });
    </script>
    <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
  </body>
</html>
