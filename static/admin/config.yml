backend:
  name: github
  repo: ittitks30-stack/hakoblog-site
  branch: main
  auth_type: pkce
  app_id: Ov23liX3osQa91lnikEQ

locale: ja
media_folder: static/images
public_folder: /images

collections:
  - name: posts
    label: 記事
    label_singular: 記事
    folder: content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "posts/{{slug}}"
    fields:
      - { label: タイトル, name: title, widget: string }
      - { label: 公開日, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: 下書き, name: draft, widget: boolean, default: false }
      - { label: 説明（SEO）, name: description, widget: string }
      - label: アイキャッチ画像
        name: cover
        widget: object
        fields:
          - { label: 画像, name: image, widget: image }
          - { label: 代替テキスト, name: alt, widget: string, default: "" }
          - { label: 相対パス, name: relative, widget: boolean, default: false }
      - label: カテゴリー
        name: categories
        widget: list
        default: ["転職エージェント"]
      - { label: 本文, name: body, widget: markdown }
