baseURL = "https://tenshokulabo.work/"
languageCode = "ja"
title = "テンショク・ラボ"
theme = "PaperMod"
hasCJKLanguage = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = true
paginate = 10

[params]
  description = "転職エージェント徹底比較・活用ガイド"
  author = "テンショク・ラボ編集部"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

[params.footer]
  text = "Hero photo by [Vitaly Gariev](https://unsplash.com/@silverkblack) on [Unsplash](https://unsplash.com/)"

[params.homeInfoParams]
  Title = "転職エージェント完全ガイド"
  Content = "転職エージェントの選び方・使い方・比較をわかりやすく解説します。"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[menu.main]]
  identifier = "posts"
  name = "記事一覧"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "カテゴリ"
  url = "/categories/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "運営者情報"
  url = "/about/"
  weight = 90

[[menu.main]]
  identifier = "contact"
  name = "お問い合わせ"
  url = "/contact/"
  weight = 95

[[menu.main]]
  identifier = "privacy"
  name = "プライバシー"
  url = "/privacy/"
  weight = 99
