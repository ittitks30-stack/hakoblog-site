<!-- 内部リンク用ブログカード（linkcard shortcode） -->
<style>
  .linkcard {
    display: flex;
    gap: 16px;
    align-items: stretch;
    border: 1px solid #e2e2e2;
    border-radius: 10px;
    padding: 14px;
    margin: 24px 0;
    text-decoration: none !important;
    color: inherit;
    background: #fff;
    transition: box-shadow .2s, transform .2s;
  }
  .linkcard:hover {
    box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    transform: translateY(-2px);
  }
  .linkcard-thumb {
    flex: 0 0 132px;
    min-height: 88px;
    border-radius: 6px;
    background-size: cover;
    background-position: center;
  }
  .linkcard-thumb-default {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    background: linear-gradient(135deg,#eef1ff,#f6ecff);
  }
  .linkcard-body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .linkcard-label {
    align-self: flex-start;
    background: #ff9800;
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 4px;
  }
  .linkcard-title {
    font-weight: 700;
    font-size: 1.02rem;
    line-height: 1.45;
    color: #222;
  }
  .linkcard-desc {
    font-size: 0.84rem;
    color: #666;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  @media (max-width: 560px) {
    .linkcard { gap: 10px; padding: 10px; }
    .linkcard-thumb { flex-basis: 96px; min-height: 72px; }
    .linkcard-desc { display: none; }
  }
</style>
